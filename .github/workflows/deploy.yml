name: Deploy to Yandex Object Storage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout content (Obsidian repo)
        uses: actions/checkout@v4
        with:
          repository: obsidian2408/koloskov
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: obsidian-content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync content
        run: node scripts/sync-content.js ${{ github.workspace }}/obsidian-content

      - name: Build
        run: npm run build

      - name: Deploy to S3 (Yandex Object Storage)
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: koloskov-rf
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: https://storage.yandexcloud.net
          AWS_REGION: ru-central1
          SOURCE_DIR: dist
